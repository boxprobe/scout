name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: ruff check
        run: uv run ruff check scout/ tests/

      - name: ruff format check
        run: uv run ruff format --check scout/ tests/

      - name: pyright
        run: uv run pyright scout/

  test:
    name: Test on Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --extra dev --python ${{ matrix.python }}

      - name: Run tests (no e2e)
        run: uv run --python ${{ matrix.python }} pytest tests/ -x --tb=short -m "not e2e"

  build:
    name: Build wheel and sdist
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build
        run: uv build

      - name: Inspect wheel metadata
        run: |
          unzip -p dist/boxprobe_scout-*.whl '*/METADATA' | head -30

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14
